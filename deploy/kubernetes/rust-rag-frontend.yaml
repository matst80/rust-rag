apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-rag-frontend-config
  labels:
    app.kubernetes.io/name: rust-rag-frontend
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  RAG_API_URL: "http://rag-service:4001"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-rag-frontend
  labels:
    app.kubernetes.io/name: rust-rag-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-rag-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-rag-frontend
    spec:
      containers:
        - name: frontend
          image: matst80/rust-rag-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: rust-rag-frontend-config
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rust-rag-frontend
  labels:
    app.kubernetes.io/name: rust-rag-frontend
spec:
  selector:
    app.kubernetes.io/name: rust-rag-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP
