apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: home
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: rag.k6n.net
      http:
        paths:
          # Frontend Next.js BFF routes (server proxies to backend with API key)
          - path: /bff
            pathType: Prefix
            backend:
              service:
                name: rag-frontend
                port:
                  number: 3000
          # Backend (rag-service → 10.10.11.135:4001)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          - path: /auth/device/code
            pathType: Exact
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          - path: /auth/device/token
            pathType: Exact
            backend:
              service:
                name: rag-service
                port:
                  number: 4001
          # Frontend catch-all (rag-frontend → 10.10.11.135:3000)
          # Handles /auth/device approval UI, /auth/login, /auth/callback,
          # /bff/* server proxies, and the Next.js app.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-frontend
                port:
                  number: 3000
  tls:
    - hosts:
        - rag.k6n.net
      secretName: rag-k6n-net-tls
