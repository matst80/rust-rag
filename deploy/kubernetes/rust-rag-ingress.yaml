apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: home
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: rag.k6n.net
      http:
        paths:
          # Frontend Next.js BFF routes (server proxies to backend with API key)
          - path: /bff
            pathType: Prefix
            backend:
              service:
                name: rust-rag-frontend
                port:
                  number: 3000
          # Backend (rag-service → 10.10.11.135:4001)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /auth/device/code
            pathType: Exact
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /auth/device/token
            pathType: Exact
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          # OAuth-MCP discovery + endpoints. MCP HTTP clients hit
          # /.well-known/* on a 401 from /mcp. nginx-ingress rejects
          # Exact pathType on dotted paths, so ImplementationSpecific.
          - path: /.well-known/oauth-protected-resource
            pathType: ImplementationSpecific
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /.well-known/oauth-authorization-server
            pathType: ImplementationSpecific
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: rag-service-cuda
                port:
                  number: 4001
          # Frontend catch-all (rag-frontend → 10.10.11.135:3000)
          # Handles /auth/device approval UI, /auth/login, /auth/callback,
          # /bff/* server proxies, and the Next.js app.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rust-rag-frontend
                port:
                  number: 3000
  tls:
    - hosts:
        - rag.k6n.net
      secretName: rag-k6n-net-tls
