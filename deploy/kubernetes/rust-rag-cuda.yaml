## In-cluster CUDA deployment of rust-rag pinned to a GPU node (`midi`).
##
## Prereqs (apply once per cluster):
##   1. nvidia-container-toolkit installed on each GPU node.
##   2. k0s containerd configured with the nvidia runtime
##      (drop nvidia.toml into /etc/k0s/containerd.d/).
##   3. RuntimeClass `nvidia` (see rust-rag-runtimeclass.yaml).
##   4. NVIDIA k8s device plugin DaemonSet installed and the GPU node
##      labelled with `nvidia.com/gpu=present`.
##
## This Deployment intentionally lives alongside the existing CPU-only
## `rust-rag` manifest so they can be rolled out independently. The Service
## name `rag-service-cuda` keeps the existing host-shim wiring untouched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-rag-cuda-config
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
data:
  RAG_HOST: "0.0.0.0"
  RAG_PORT: "4001"
  RAG_DB_PATH: "/app/data/rag.db"
  RAG_UPLOAD_PATH: "/app/data/uploads"
  RAG_MODEL_PATH: "/app/assets/bge-small-en-v1.5/model.onnx"
  RAG_TOKENIZER_PATH: "/app/assets/bge-small-en-v1.5/tokenizer.json"
  RAG_EMBEDDING_DIMENSION: "384"
  RAG_INTRA_THREADS: "2"
  RAG_CUDA_DEVICE_ID: "0"
  RAG_CUDA_MEM_LIMIT_MB: "2048"
  RAG_GRAPH_ENABLED: "true"
  RAG_GRAPH_BUILD_ON_STARTUP: "true"
  RAG_AUTH_ENABLED: "true"
  ZITADEL_ISSUER: "https://auth.k6n.net"
  ZITADEL_CLIENT_ID: "369530153681881434@rag"
  ZITADEL_SCOPES: "openid profile email"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-rag-cuda-data
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-rag-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-rag
      app.kubernetes.io/variant: cuda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-rag
        app.kubernetes.io/variant: cuda
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: midi
      containers:
        - name: rust-rag
          image: matst80/rust-rag:cuda
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: rust-rag-cuda-config
            - secretRef:
                name: rust-rag-frontend-auth
          volumeMounts:
            - name: data
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rust-rag-cuda-data
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  selector:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
  ports:
    - name: http
      port: 4001
      targetPort: http
  type: ClusterIP
