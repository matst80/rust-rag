## In-cluster CUDA deployment of rust-rag pinned to a GPU node (`midi`).
##
## Prereqs (apply once per cluster):
##   1. nvidia-container-toolkit installed on each GPU node.
##   2. k0s containerd configured with the nvidia runtime
##      (drop nvidia.toml into /etc/k0s/containerd.d/).
##   3. RuntimeClass `nvidia` (see rust-rag-runtimeclass.yaml).
##   4. NVIDIA k8s device plugin DaemonSet installed and the GPU node
##      labelled with `nvidia.com/gpu=present`.
##
## This Deployment intentionally lives alongside the existing CPU-only
## `rust-rag` manifest so they can be rolled out independently. The Service
## name `rag-service-cuda` keeps the existing host-shim wiring untouched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-rag-cuda-config
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
data:
  RAG_HOST: "0.0.0.0"
  RAG_PORT: "4001"
  ## SQLite path is still set because the legacy `SqliteVectorStore` is
  ## opened on boot for backward-compat — but with `RAG_DATABASE_URL` set
  ## (see Secret below), every trait surface routes to Postgres and the
  ## SQLite file at this path is unused. Safe to delete after the cutover
  ## settles; the PVC stays mounted for the moment as a rollback option.
  RAG_DB_PATH: "/app/data/rag.db"
  RAG_UPLOAD_PATH: "/app/data/uploads"
  ## bge-m3 (1024-d, CLS-pooled) — the image bakes the assets at this path.
  RAG_MODEL_PATH: "/app/assets/bge-m3/model.onnx"
  RAG_TOKENIZER_PATH: "/app/assets/bge-m3/tokenizer.json"
  RAG_EMBEDDING_DIMENSION: "1024"
  RAG_EMBEDDING_POOLING: "cls"
  ## Header-aware chunking via `text-splitter`, sized in real bge-m3 tokens.
  RAG_CHUNK_MAX_TOKENS: "500"
  RAG_CHUNK_OVERLAP_TOKENS: "50"
  RAG_INTRA_THREADS: "2"
  RAG_CUDA_DEVICE_ID: "0"
  ## GPU is shared with the reranker arena; total budget on a 6 GB card
  ## (1660 SUPER on sunk) is ~5500 MB usable. Embedder gets the bulk.
  RAG_CUDA_MEM_LIMIT_MB: "3000"
  ## Hard-fail at session creation if CUDA EP doesn't register (instead of
  ## silently falling back to CPU). Flip to "false" to allow CPU fallback.
  RAG_CUDA_STRICT: "true"
  ## Verbose ORT log during cutover — drop back to "warning" once stable.
  RAG_ORT_LOG_LEVEL: "info"
  ## Phase 3 cross-encoder reranker. Toggle "true" once the bge-reranker-v2-m3
  ## ONNX export has been fetched (initContainer below) and the image carries
  ## the matching binary. ~1.1 GB additional VRAM, ~50–150 ms / batch.
  RAG_RERANKER_ENABLED: "true"
  RAG_RERANKER_MODEL_PATH: "/app/assets/bge-reranker-v2-m3/model_fp16.onnx"
  RAG_RERANKER_TOKENIZER_PATH: "/app/assets/bge-reranker-v2-m3/tokenizer.json"
  RAG_RERANKER_TOP_N: "15"
  RAG_RERANKER_MAX_TOKENS: "512"
  RAG_RERANKER_INTRA_THREADS: "2"
  RAG_RERANKER_CUDA_MEM_LIMIT_MB: "1500"
  RAG_GRAPH_ENABLED: "true"
  RAG_GRAPH_BUILD_ON_STARTUP: "true"
  RAG_AUTH_ENABLED: "true"
  ## Comma-separated list of Zitadel subject IDs (the JWT `sub` claim)
  ## that bypass per-message ownership checks for channel clear and
  ## individual message delete/update. ApiKey + Disabled auth paths are
  ## already unrestricted; this knob covers session-cookie users.
  RAG_ADMIN_SUBJECTS: "369527412653951321"
  RAG_OPENAI_API_BASE_URL: "http://llama-cpp-server.llm.svc.cluster.local/v1"
  RAG_OPENAI_MODEL: "Opus4.7-Distill-GODsGhost-Codex-4B-Q4_K_M.gguf"
  ZITADEL_ISSUER: "https://auth.k6n.net"
  ZITADEL_CLIENT_ID: "369530153681881434@rag"
  ZITADEL_SCOPES: "openid profile email"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-rag-cuda-data
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
## Persistent model cache. The bge-m3 export is ~2 GB (fp32). Keeping it on
## a PVC means it's downloaded once per cluster, not per pod restart. Bump
## the storage request when adding more models or switching to bge-m3 fp16.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-rag-cuda-models
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-rag-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-rag
      app.kubernetes.io/variant: cuda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-rag
        app.kubernetes.io/variant: cuda
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: sunk
      ## Init container fetches the bge-m3 ONNX export from HuggingFace into
      ## the models PVC on first boot. Subsequent restarts skip the download
      ## (idempotent: no-op if model.onnx_data is already present at full
      ## size). Verify URLs against the HF repo if upstream layout shifts.
      ## ~2 GB transfer; pulls take a few minutes on first boot.
      initContainers:
        - name: fetch-bge-m3
          image: curlimages/curl:8.10.1
          env:
            - name: HF_REPO
              value: "https://huggingface.co/BAAI/bge-m3/resolve/main"
          command:
            - /bin/sh
            - -ec
            - |
              cd /models
              mkdir -p bge-m3 && cd bge-m3
              fetch() {
                local name=$1
                local url=$2
                local min_bytes=${3:-1}
                if [ -s "$name" ] && [ "$(stat -c%s "$name")" -ge "$min_bytes" ]; then
                  echo "skip: $name already present ($(stat -c%s "$name") bytes)"
                  return
                fi
                echo "fetching $name from $url"
                curl --fail --location --retry 5 --retry-delay 5 \
                  --output "$name.tmp" "$url"
                mv "$name.tmp" "$name"
              }
              fetch model.onnx        "$HF_REPO/onnx/model.onnx"        100000
              fetch model.onnx_data   "$HF_REPO/onnx/model.onnx_data"   1500000000
              fetch tokenizer.json    "$HF_REPO/tokenizer.json"         5000000
              fetch sentencepiece.bpe.model "$HF_REPO/sentencepiece.bpe.model" 1000000
              echo "model cache ready:"
              ls -lh
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 3Gi
        ## Optional reranker assets. Skipped at runtime when
        ## RAG_RERANKER_ENABLED is unset; the fetch itself runs unconditionally
        ## so toggling the flag later doesn't require a re-roll. ~600 MB.
        - name: fetch-bge-reranker
          image: curlimages/curl:8.10.1
          env:
            ## BAAI's own bge-reranker-v2-m3 repo ships only safetensors —
            ## use onnx-community's pre-converted mirror, which carries fp16
            ## (~1.1 GB) under onnx/.
            - name: HF_REPO
              value: "https://huggingface.co/onnx-community/bge-reranker-v2-m3-ONNX/resolve/main"
          command:
            - /bin/sh
            - -ec
            - |
              cd /models
              mkdir -p bge-reranker-v2-m3 && cd bge-reranker-v2-m3
              fetch() {
                local name=$1
                local url=$2
                local min_bytes=${3:-1}
                if [ -s "$name" ] && [ "$(stat -c%s "$name")" -ge "$min_bytes" ]; then
                  echo "skip: $name already present ($(stat -c%s "$name") bytes)"
                  return
                fi
                echo "fetching $name from $url"
                curl --fail --location --retry 5 --retry-delay 5 \
                  --output "$name.tmp" "$url"
                mv "$name.tmp" "$name"
              }
              # fp16 single-file (~1.1 GB resident). int8 was tried but ORT's
              # CUDA EP lacks accelerated int8 kernels for QDQ ops — falls
              # back to CPU partial and runs ~5× slower than fp16. Stick to
              # fp16 unless we move to TensorRT EP.
              fetch model_fp16.onnx "$HF_REPO/onnx/model_fp16.onnx" 800000000
              fetch tokenizer.json  "$HF_REPO/tokenizer.json"        5000000
              echo "reranker cache ready:"
              ls -lh
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 3Gi
      containers:
        - name: rust-rag
          image: matst80/rust-rag:cuda
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: rust-rag-cuda-config
            - secretRef:
                name: rust-rag-frontend-auth
            ## RAG_DATABASE_URL = postgres://user:pass@host:5432/db
            ## Create out-of-band:
            ##   kubectl -n home create secret generic rust-rag-postgres \
            ##     --from-literal=RAG_DATABASE_URL=postgres://...
            - secretRef:
                name: rust-rag-postgres
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/assets/bge-m3
              subPath: bge-m3
              readOnly: true
            - name: models
              mountPath: /app/assets/bge-reranker-v2-m3
              subPath: bge-reranker-v2-m3
              readOnly: true
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rust-rag-cuda-data
        - name: models
          persistentVolumeClaim:
            claimName: rust-rag-cuda-models
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  selector:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
  ports:
    - name: http
      port: 4001
      targetPort: http
  type: ClusterIP
