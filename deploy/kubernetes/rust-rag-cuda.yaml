## In-cluster CUDA deployment of rust-rag pinned to a GPU node (`midi`).
##
## Prereqs (apply once per cluster):
##   1. nvidia-container-toolkit installed on each GPU node.
##   2. k0s containerd configured with the nvidia runtime
##      (drop nvidia.toml into /etc/k0s/containerd.d/).
##   3. RuntimeClass `nvidia` (see rust-rag-runtimeclass.yaml).
##   4. NVIDIA k8s device plugin DaemonSet installed and the GPU node
##      labelled with `nvidia.com/gpu=present`.
##
## This Deployment intentionally lives alongside the existing CPU-only
## `rust-rag` manifest so they can be rolled out independently. The Service
## name `rag-service-cuda` keeps the existing host-shim wiring untouched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-rag-cuda-config
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
data:
  RAG_HOST: "0.0.0.0"
  RAG_PORT: "4001"
  ## SQLite path is still set because the legacy `SqliteVectorStore` is
  ## opened on boot for backward-compat — but with `RAG_DATABASE_URL` set
  ## (see Secret below), every trait surface routes to Postgres and the
  ## SQLite file at this path is unused. Safe to delete after the cutover
  ## settles; the PVC stays mounted for the moment as a rollback option.
  RAG_DB_PATH: "/app/data/rag.db"
  RAG_UPLOAD_PATH: "/app/data/uploads"
  ## bge-m3 (1024-d, CLS-pooled) — the image bakes the assets at this path.
  RAG_MODEL_PATH: "/app/assets/bge-m3/model.onnx"
  RAG_TOKENIZER_PATH: "/app/assets/bge-m3/tokenizer.json"
  RAG_EMBEDDING_DIMENSION: "1024"
  RAG_EMBEDDING_POOLING: "cls"
  ## Header-aware chunking via `text-splitter`, sized in real bge-m3 tokens.
  RAG_CHUNK_MAX_TOKENS: "500"
  RAG_CHUNK_OVERLAP_TOKENS: "50"
  RAG_INTRA_THREADS: "2"
  RAG_CUDA_DEVICE_ID: "0"
  ## RTX 2080 (serber) — 8 GB total, ~7500 MB usable. Tensor cores
  ## present, so fp16 actually accelerates here unlike on the 1660 SUPER.
  ## Embedder bge-m3 + reranker bge-reranker-base both fit comfortably.
  RAG_CUDA_MEM_LIMIT_MB: "4000"
  ## Hard-fail at session creation if CUDA EP doesn't register (instead of
  ## silently falling back to CPU). Flip to "false" to allow CPU fallback.
  RAG_CUDA_STRICT: "true"
  ## Verbose ORT log during cutover — drop back to "warning" once stable.
  RAG_ORT_LOG_LEVEL: "info"
  ## Phase 3 cross-encoder reranker. Switched from bge-reranker-v2-m3
  ## (568M params, XLM-RoBERTa-large) to bge-reranker-base (~135M, ~4×
  ## smaller) — v2-m3 hit ~4s / batch on the 1660 SUPER (Turing, no
  ## fp16 tensor cores). Tradeoff: base is English-leaning, v2-m3 was
  ## multilingual. Revert by flipping paths back.
  RAG_RERANKER_ENABLED: "true"
  RAG_RERANKER_MODEL_PATH: "/app/assets/bge-reranker-base/model_fp16.onnx"
  RAG_RERANKER_TOKENIZER_PATH: "/app/assets/bge-reranker-base/tokenizer.json"
  RAG_RERANKER_TOP_N: "25"
  ## Lowered from 512 → 256: cross-encoder attention is O(seq_len²), so
  ## halving the cap is a 4× speedup. Chunks are 500 bge-m3 tokens; the
  ## reranker tokenizer is XLM-R, similar count. With chunk_text fed to
  ## the reranker (instead of full doc text), most pairs fit comfortably.
  RAG_RERANKER_MAX_TOKENS: "256"
  RAG_RERANKER_INTRA_THREADS: "2"
  RAG_RERANKER_CUDA_MEM_LIMIT_MB: "2000"
  RAG_GRAPH_ENABLED: "true"
  RAG_GRAPH_BUILD_ON_STARTUP: "true"
  RAG_AUTH_ENABLED: "true"
  ## DNS rebinding guard for /mcp. Default allowlist is localhost only;
  ## must include the public hostname so VSCode/Cursor over the ingress
  ## are not rejected with 403 "Host header is not allowed".
  RAG_MCP_ALLOWED_HOSTS: "rag.k6n.net,localhost,127.0.0.1,::1"
  ## Comma-separated list of Zitadel subject IDs (the JWT `sub` claim)
  ## that bypass per-message ownership checks for channel clear and
  ## individual message delete/update. ApiKey + Disabled auth paths are
  ## already unrestricted; this knob covers session-cookie users.
  RAG_ADMIN_SUBJECTS: "369527412653951321"
  RAG_OPENAI_API_BASE_URL: "http://llama-cpp-server.llm.svc.cluster.local/v1"
  RAG_OPENAI_MODEL: "Opus4.7-Distill-GODsGhost-Codex-4B-Q4_K_M.gguf"
  ## LLM-on-store analysis pass. Probe-verified config: bare-metal
  ## llama.cpp at 10.10.11.135:8082 serving unsloth/Qwen3.5-4B-GGUF
  ## with thinking disabled via chat_template_kwargs (llama.cpp build
  ## ignores reasoning_effort + thinking_budget — must be hard-off).
  ## Falls back to RAG_OPENAI_* if any of these are unset.
  RAG_ANALYSIS_ENABLED: "true"
  RAG_ANALYSIS_BASE_URL: "http://10.10.11.135:8082/v1"
  RAG_ANALYSIS_MODEL: "unsloth/Qwen3.5-4B-GGUF"
  RAG_ANALYSIS_TIMEOUT_SECS: "30"
  RAG_ANALYSIS_MAX_NEIGHBORS: "8"
  RAG_ANALYSIS_NEIGHBOR_THRESHOLD: "0.65"
  ## Ontology worker — pulls items with `ontology_status=pending`, embeds
  ## them, asks the analysis LLM (preferred) or the chat LLM to extract
  ## typed edges against neighbors, and writes them to the graph table.
  ## Verify on demand via `POST /admin/ontology/run` or
  ## `POST /admin/ontology/run/{item_id}` (admin auth).
  RAG_ONTOLOGY_ENABLED: "true"
  RAG_ONTOLOGY_CONFIDENCE_THRESHOLD: "0.5"
  RAG_ONTOLOGY_BATCH_SIZE: "2"
  RAG_ONTOLOGY_INTERVAL_SECS: "60"
  RAG_ONTOLOGY_NEIGHBOR_COUNT: "10"
  RAG_ONTOLOGY_TARGET_PREVIEW_CHARS: "800"
  RAG_ONTOLOGY_CANDIDATE_PREVIEW_CHARS: "300"
  ## Manager loop. Drives the cron + mention-triggered orchestrator that
  ## reads `manager` channel + tool-calls into ACP / RAG / message tools.
  ## Uses xAI Grok Fast Reasoning over the public API; api key lands via
  ## RAG_MANAGER_API_KEY in the rust-rag-frontend-auth Secret.
  RAG_MANAGER_ENABLED: "true"
  RAG_MANAGER_API_BASE_URL: "https://api.x.ai/v1"
  RAG_MANAGER_MODEL: "grok-4-1-fast-reasoning"
  RAG_MANAGER_CHANNEL: "manager"
  RAG_MANAGER_MENTION: "@manager"
  RAG_MANAGER_INTERVAL_SECS: "300"
  RAG_MANAGER_TIMEOUT_SECS: "120"
  RAG_MANAGER_MAX_ITERATIONS: "8"
  RAG_MANAGER_MEMORY_SOURCE_ID: "manager_memory"
  ## Pod runs in a k8s subnet that user LAN can't multicast into, so the
  ## mDNS browse for `_acp-ws._tcp` would never resolve anyone. Switch to
  ## HTTP-only mode: clients call POST /api/acp/register from the LAN side.
  RAG_ACP_DISCOVERY_MODE: "http"
  RAG_ACP_REGISTER_TTL_SECS: "120"
  ## OpenTelemetry traces. otel-debug-service in monitoring exposes OTLP
  ## gRPC on :4317; tracing-opentelemetry layers on top of the existing
  ## tracing fmt subscriber so every #[instrument] span ships through.
  RAG_OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-debug-service.monitoring.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "rust-rag"
  ZITADEL_ISSUER: "https://auth.k6n.net"
  ZITADEL_CLIENT_ID: "369530153681881434@rag"
  ZITADEL_SCOPES: "openid profile email"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-rag-cuda-data
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
## Persistent model cache. The bge-m3 export is ~2 GB (fp32). Keeping it on
## a PVC means it's downloaded once per cluster, not per pod restart. Bump
## the storage request when adding more models or switching to bge-m3 fp16.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rust-rag-cuda-models
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-rag-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-rag
      app.kubernetes.io/variant: cuda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-rag
        app.kubernetes.io/variant: cuda
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: serber
      ## Init container fetches the bge-m3 ONNX export from HuggingFace into
      ## the models PVC on first boot. Subsequent restarts skip the download
      ## (idempotent: no-op if model.onnx_data is already present at full
      ## size). Verify URLs against the HF repo if upstream layout shifts.
      ## ~2 GB transfer; pulls take a few minutes on first boot.
      initContainers:
        - name: fetch-bge-m3
          image: curlimages/curl:8.10.1
          env:
            - name: HF_REPO
              value: "https://huggingface.co/BAAI/bge-m3/resolve/main"
          command:
            - /bin/sh
            - -ec
            - |
              cd /models
              mkdir -p bge-m3 && cd bge-m3
              fetch() {
                local name=$1
                local url=$2
                local min_bytes=${3:-1}
                if [ -s "$name" ] && [ "$(stat -c%s "$name")" -ge "$min_bytes" ]; then
                  echo "skip: $name already present ($(stat -c%s "$name") bytes)"
                  return
                fi
                echo "fetching $name from $url"
                curl --fail --location --retry 5 --retry-delay 5 \
                  --output "$name.tmp" "$url"
                mv "$name.tmp" "$name"
              }
              fetch model.onnx        "$HF_REPO/onnx/model.onnx"        100000
              fetch model.onnx_data   "$HF_REPO/onnx/model.onnx_data"   1500000000
              fetch tokenizer.json    "$HF_REPO/tokenizer.json"         5000000
              fetch sentencepiece.bpe.model "$HF_REPO/sentencepiece.bpe.model" 1000000
              echo "model cache ready:"
              ls -lh
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 3Gi
        ## Optional reranker assets. Skipped at runtime when
        ## RAG_RERANKER_ENABLED is unset; the fetch itself runs unconditionally
        ## so toggling the flag later doesn't require a re-roll. ~600 MB.
        - name: fetch-bge-reranker
          image: curlimages/curl:8.10.1
          env:
            ## bge-reranker-base ONNX (XLM-RoBERTa-base ~135M, fp16 ~270 MB).
            ## onnx-community mirrors BAAI/bge-reranker-base with fp16 +
            ## tokenizer.json. Smaller than v2-m3 — sub-second batches on
            ## consumer Turing without tensor cores.
            - name: HF_REPO
              value: "https://huggingface.co/onnx-community/bge-reranker-base-ONNX/resolve/main"
          command:
            - /bin/sh
            - -ec
            - |
              cd /models
              mkdir -p bge-reranker-base && cd bge-reranker-base
              fetch() {
                local name=$1
                local url=$2
                local min_bytes=${3:-1}
                if [ -s "$name" ] && [ "$(stat -c%s "$name")" -ge "$min_bytes" ]; then
                  echo "skip: $name already present ($(stat -c%s "$name") bytes)"
                  return
                fi
                echo "fetching $name from $url"
                curl --fail --location --retry 5 --retry-delay 5 \
                  --output "$name.tmp" "$url"
                mv "$name.tmp" "$name"
              }
              # ~270 MB fp16. Smaller variants (int8/q4) were skipped — ORT
              # CUDA EP lacks accelerated int8 kernels for QDQ ops, so they
              # actually run slower than fp16 here. TensorRT EP would change
              # that calculus.
              fetch model_fp16.onnx "$HF_REPO/onnx/model_fp16.onnx" 100000000
              fetch tokenizer.json  "$HF_REPO/tokenizer.json"        1000000
              echo "reranker cache ready:"
              ls -lh
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 3Gi
      containers:
        - name: rust-rag
          image: matst80/rust-rag:cuda
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: rust-rag-cuda-config
            - secretRef:
                name: rust-rag-frontend-auth
            ## RAG_MANAGER_API_KEY (xAI bearer for the Grok manager loop)
            - secretRef:
                name: common-secret
            ## RAG_DATABASE_URL = postgres://user:pass@host:5432/db
            ## Create out-of-band:
            ##   kubectl -n home create secret generic rust-rag-postgres \
            ##     --from-literal=RAG_DATABASE_URL=postgres://...
            - secretRef:
                name: rust-rag-postgres
            ## Google OAuth client + master key for AES-GCM-encrypting
            ## stored access/refresh tokens. Required for
            ## /api/integrations/google/*. Create out-of-band:
            ##   kubectl -n home create secret generic rust-rag-oauth \
            ##     --from-literal=OAUTH_TOKEN_ENC_KEY=... \
            ##     --from-literal=GOOGLE_OAUTH_CLIENT_ID=... \
            ##     --from-literal=GOOGLE_OAUTH_CLIENT_SECRET=... \
            ##     --from-literal=GOOGLE_OAUTH_REDIRECT_URI=https://rag.k6n.net/api/integrations/google/callback
            - secretRef:
                name: rust-rag-oauth
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/assets/bge-m3
              subPath: bge-m3
              readOnly: true
            - name: models
              mountPath: /app/assets/bge-reranker-base
              subPath: bge-reranker-base
              readOnly: true
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rust-rag-cuda-data
        - name: models
          persistentVolumeClaim:
            claimName: rust-rag-cuda-models
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service-cuda
  labels:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
spec:
  selector:
    app.kubernetes.io/name: rust-rag
    app.kubernetes.io/variant: cuda
  ports:
    - name: http
      port: 4001
      targetPort: http
  type: ClusterIP
