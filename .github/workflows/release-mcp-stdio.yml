name: Release mcp-stdio

on:
  push:
    tags:
      - mcp-stdio-v*

permissions:
  contents: write

env:
  BINARY_NAME: mcp-stdio

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_name: mcp-stdio-linux-amd64
            archive_suffix: linux-amd64
          - target: aarch64-unknown-linux-musl
            asset_name: mcp-stdio-linux-arm64
            archive_suffix: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        working-directory: mcp-stdio
        run: cross build --locked --release --target ${{ matrix.target }}

      - name: Package release artifact
        working-directory: mcp-stdio
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          staging_dir="${BINARY_NAME}-${TAG}-${{ matrix.archive_suffix }}"
          mkdir -p "$staging_dir"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$staging_dir/${BINARY_NAME}"
          cp "README.md" "$staging_dir/README.md"
          tar -czf "dist/${staging_dir}.tar.gz" "$staging_dir"
          sha256sum "dist/${staging_dir}.tar.gz" > "dist/${staging_dir}.tar.gz.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            mcp-stdio/dist/*.tar.gz
            mcp-stdio/dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256